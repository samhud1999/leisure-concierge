# Render Blueprint for Leisure Concierge.
# Apply via Render dashboard → New → Blueprint → select this repo.
# Three secrets (sync:false) are pasted in the dashboard, not stored here.

services:
  - type: web
    name: leisure-concierge
    runtime: node
    plan: free                  # upgrade to "starter" ($7/mo) to remove the 15-min idle shutdown
    region: singapore           # closest to AU users; switch to "frankfurt"/"oregon" if preferred
    rootDir: server             # repo root → server/ holds package.json
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22

      # --- Secrets: paste these into the Render dashboard on first deploy. ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ZAI_API_KEY
        sync: false

      # --- Non-secret config. Safe to commit. ---
      - key: ZAI_MODEL
        value: glm-4.7          # swap to glm-4.7-flash for cheaper/faster dev iteration
      - key: ZAI_BASE_URL
        value: https://api.z.ai/api/anthropic
      - key: RESORT_BRAND
        value: RACV
