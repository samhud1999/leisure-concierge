<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RACV Concierge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    /* Palette */
    --racv-navy:    #1f5aa5;
    --racv-navy-2:  #1967b0;
    --racv-accent:  #009bde;
    --racv-ink:     #454849;
    --racv-muted:   #a7a8aa;
    --racv-line:    #d9d9d9;
    --racv-bg:      #f2f2f2;
    --racv-card:    #ffffff;
    --racv-warning: #ffbf47;
    --racv-success: #2e7d32;

    /* Typography */
    --font-brand: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --fs-h1: 50px;
    --fs-h2: 30px;
    --fs-h3: 20px;
    --fs-body: 15px;
    --fs-small: 12.5px;
    --fs-button: 14px;

    /* Spacing scale */
    --s-1: 4px;
    --s-2: 8px;
    --s-3: 16px;
    --s-4: 24px;
    --s-5: 32px;

    /* Radii — RACV uses square (0) buttons; cards have minimal radius */
    --r-button: 0;
    --r-card:   4px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--racv-bg);
    color: var(--racv-ink);
    font-family: var(--font-brand);
    font-size: var(--fs-body);
    line-height: 1.55;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #fff;
    color: var(--racv-ink);
    padding: var(--s-3) var(--s-4);
    display: flex;
    align-items: center;
    gap: var(--s-3);
    border-bottom: 1px solid var(--racv-line);
    box-shadow: 0 1px 0 rgba(0,0,0,.04);
  }
  header .brand { display: flex; align-items: center; gap: var(--s-3); text-decoration: none; }
  header .brand img { height: 32px; width: auto; display: block; }
  header .brand-divider {
    width: 1px; height: 28px; background: var(--racv-line); margin: 0 var(--s-2);
  }
  header h1 {
    font-size: var(--fs-h3);
    margin: 0;
    font-weight: 600;
    color: var(--racv-navy);
    letter-spacing: 0.1px;
  }
  header p {
    margin: 2px 0 0;
    font-size: var(--fs-small);
    color: var(--racv-muted);
  }
  main {
    flex: 1;
    overflow-y: auto;
    padding: var(--s-4) var(--s-4) var(--s-5);
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    scroll-behavior: smooth;
  }
  .msg { display: flex; margin-bottom: var(--s-3); }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: var(--s-3) var(--s-4);
    border-radius: var(--r-card);
    line-height: 1.55;
    font-size: var(--fs-body);
    box-shadow: 0 1px 2px rgba(20, 30, 60, 0.04);
  }
  .msg.assistant .bubble {
    background: var(--racv-card);
    border: 1px solid var(--racv-line);
    border-top-left-radius: var(--s-1);
    color: var(--racv-ink);
  }
  .msg.user .bubble {
    background: var(--racv-navy);
    color: #fff;
    border-top-right-radius: var(--s-1);
  }
  .bubble h1, .bubble h2, .bubble h3 {
    font-size: var(--fs-h3);
    margin: var(--s-3) 0 var(--s-2);
    color: var(--racv-navy);
    font-weight: 600;
  }
  .msg.user .bubble h1,
  .msg.user .bubble h2,
  .msg.user .bubble h3 { color: #fff; }
  .bubble p { margin: var(--s-2) 0; }
  .bubble ul, .bubble ol { margin: var(--s-2) 0; padding-left: var(--s-4); }
  .bubble li { margin: 2px 0; }
  .bubble a {
    color: var(--racv-navy);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .msg.user .bubble a { color: #fff; }
  .bubble strong { color: inherit; font-weight: 600; }
  .bubble :first-child { margin-top: 0; }
  .bubble :last-child { margin-bottom: 0; }
  .typing { color: var(--racv-muted); font-style: italic; }
  footer {
    border-top: 1px solid var(--racv-line);
    background: var(--racv-card);
    padding: var(--s-3) var(--s-4) var(--s-2);
  }
  .composer {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    gap: var(--s-2);
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--racv-line);
    border-radius: var(--r-card);
    padding: var(--s-3) var(--s-3);
    font: inherit;
    font-size: var(--fs-body);
    color: var(--racv-ink);
    background: #fff;
    max-height: 140px;
    outline: none;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  textarea:focus {
    border-color: var(--racv-navy);
    box-shadow: 0 0 0 3px rgba(31, 90, 165, 0.18);
  }
  button {
    background: var(--racv-navy);
    color: #fff;
    border: 0;
    border-radius: var(--r-button);
    padding: var(--s-3) var(--s-4);
    font-size: var(--fs-button);
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background-color 120ms ease;
  }
  button:hover { background: var(--racv-navy-2); }
  button:focus-visible {
    outline: 3px solid var(--racv-accent);
    outline-offset: 2px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .hint {
    max-width: 860px;
    margin: var(--s-2) auto 0;
    font-size: var(--fs-small);
    color: var(--racv-muted);
  }
  .disclaimer {
    max-width: 860px;
    margin: 4px auto 0;
    font-size: var(--fs-small);
    color: var(--racv-muted);
    text-align: center;
  }
</style>
</head>
<body>
  <header>
    <a class="brand" href="/" aria-label="RACV home">
      <img src="/img/racv-logo.svg" alt="RACV" />
    </a>
    <span class="brand-divider" aria-hidden="true"></span>
    <div>
      <h1>Member Concierge</h1>
      <p>Your personalised stay, planned around you.</p>
    </div>
  </header>

  <main id="thread"></main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Type your message…" autofocus aria-label="Message"></textarea>
      <button id="send" type="button">Send</button>
    </div>
    <div class="hint">Tip: try member number <strong>100201</strong>, surname <strong>Whitman</strong>.</div>
    <div class="disclaimer">Proof of concept — not affiliated with RACV.</div>
  </footer>

<script>
  const thread = document.getElementById('thread');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  // Full conversation history sent to the backend each turn.
  let history = [];

  function render(role, markdown) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'assistant' ? marked.parse(markdown) : escapeHtml(markdown);
    wrap.appendChild(bubble);
    thread.appendChild(wrap);
    thread.scrollTop = thread.scrollHeight;
    return bubble;
  }
  function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])).replace(/\n/g,'<br>');}

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    render('user', text);
    history.push({ role: 'user', content: text });

    sendBtn.disabled = true;
    const typing = render('assistant', '');
    typing.parentElement.querySelector('.bubble').innerHTML = '<span class="typing">Composing…</span>';

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      typing.parentElement.remove();
      if (data.error) {
        render('assistant', '⚠️ ' + (data.detail || data.error));
      } else {
        history = data.messages;            // keep server-augmented history (tool calls etc.)
        render('assistant', data.reply || '…');
      }
    } catch (e) {
      typing.parentElement.remove();
      render('assistant', '⚠️ Connection error: ' + e.message);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  // Greeting
  render('assistant', "Good day, and welcome to the **RACV Member Concierge**. I'd be delighted to plan your stay.\n\nTo begin, may I have your **member number** and **surname**?");
</script>
</body>
</html>
